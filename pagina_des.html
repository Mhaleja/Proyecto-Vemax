<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>VEMAX - Inicio</title>

    <style>
        body {
            background-color: #cce7ff;
            margin: 0;
            font-family: Arial;
        }

        .navbar {
            background-color: #003366;
            padding: 15px;
            text-align: center;
        }

        .navbar a {
            color: white;
            margin: 0 15px;
            text-decoration: none;
            font-weight: bold;
        }

   
        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr); /* 2 columnas */
            gap: 20px;
            padding: 40px;
        }

   
        .card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.2);
        }
    </style>
</head>

<body>

    <div class="navbar">
        <a href="/perfil"> Perfil</a>

        <a href="#"> Objetivos</a>
        <a href="#"> Objetivos</a>
        <a href="#">🔔</a>
    </div>


    <div class="grid">

        <div class="card">
            <h3>Balance mensual</h3>
         
        </div>

        <div class="card">
            <h3>Gasto mensual</h3>
       
        </div>

        <div class="card">
            <h3>Objetivo de ahorro</h3>
        
        </div>

        <div class="card">
            <h3>Gráfico gastos</h3>
            <img src="imagen3.png" alt="imagen3">
        </div>

    </div>

</html>
