<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VEMAX</title>

    <!-- RUTAS CORREGIDAS -->
    <link rel="shortcut icon" href="icon/VEMAX.png" type="image/x-icon">
    <link rel="stylesheet" href="estilos.css">
</head>

<body>

<div class="container">
    <div class="part1-container">

        <div class="encabezado">
            <span>VEMAX</span>
        </div>

        <div class="form" id="form">

            <!-- LOGIN -->
            <form class="inicio">
                <h2>Bienvenido de nuevo</h2>
                <p>¡Hola! Es momento de organizar las nueces del día. ¡Entra y revisa tu saldo!</p>

                <div class="input">
                    <label>Correo Electronico</label>
                    <input type="email" id="correoLogin" placeholder="Ingresa tu correo">
                </div>

                <div class="input">
                    <label>Contraseña</label>
                    <input type="password" id="contraseñaLogin" placeholder="Ingresa tu contraseña">
                </div>

                <div class="recordatorio">
                    <div>
                        <input type="checkbox">
                        <label>Recuérdame</label>
                    </div>
                    <span>¿Olvidaste la contraseña?</span>
                </div>

                <div class="botones">
                    <button type="button" onclick="login()">Iniciar sesión</button>

                    <button type="button">
                        <img src="icon/google.png" class="google">
                        Google
                    </button>
                </div>

                <p>¿No tienes una cuenta? <a href="#" id="sign-up">Regístrate</a></p>
            </form>


            <!-- REGISTRO -->
            <form class="registro">
                <h2>Crea tu cuenta</h2>
                <p>Bienvenido a Vemax. Gestiona tus "nueces" fácilmente.</p>

                <div class="input">
                    <label>Usuario</label>
                    <input type="text" id="usuario" placeholder="Ingresa tu usuario">
                </div>

                <div class="input">
                    <label>Correo Electronico</label>
                    <input type="email" id="correo" placeholder="Ingresa tu correo">
                </div>

                <div class="input">
                    <label>Contraseña</label>
                    <input type="password" id="contraseña" placeholder="Ingresa tu contraseña">
                </div>

                <div class="input">
                    <label>Código</label>
                    <input type="number" id="codigo" placeholder="Ingresa tu código">
                </div>

                <div class="botones">
                    <button type="button" onclick="registrar()">Registrarse</button>

                    <button type="button">
                        <img src="icon/google.png" class="google">
                        Google
                    </button>
                </div>

                <p>¿Ya tienes cuenta? <a href="#" id="sign-in">Iniciar sesión</a></p>
            </form>

        </div>

        <p id="respuesta"></p>

        <div class="inferior">
            <span>VEMAX 2025</span>
        </div>
    </div>

    <div class="part2-banner">
        <div class="circle"></div>
        <div class="circle-2"></div>
    </div>
</div>

<!-- SCRIPT -->
<script src="animaciones.js"></script>

<script>
// REGISTRO
function registrar(){
    let correo = document.getElementById("correo").value;
    let usuario = document.getElementById("usuario").value;
    let contraseña = document.getElementById("contraseña").value;
    let codigo = parseInt(document.getElementById("codigo").value);

    fetch("/registro", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ correo, usuario, contraseña, codigo })
    })
    .then(res => res.json())
    .then(data => {
        document.getElementById("respuesta").textContent = data.mensaje;
    });
}

// LOGIN
function login(){
    let correo = document.getElementById("correoLogin").value;
    let contraseña = document.getElementById("contraseñaLogin").value;

    fetch("/login", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ correo, contraseña })
    })
    .then(res => res.json())
    .then(data => {
        document.getElementById("respuesta").textContent = data.mensaje;
    });
}
</script>

</body>
</html>
