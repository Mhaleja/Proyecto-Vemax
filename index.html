<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>VEMAX</title>

    <link rel="stylesheet" href="/static/estilos.css">
    <link rel="shortcut icon" href="/static/icon/VEMAX.png">
</head>

<body>
<div class="container">

    <h1>VEMAX</h1>

    <h2>Login</h2>
    <input type="email" id="correoLogin" placeholder="Correo">
    <input type="password" id="passwordLogin" placeholder="Contraseña">
    <button onclick="login()">Entrar</button>

  
    <h2>Registro</h2>
    <input type="text" id="usuario" placeholder="Usuario">
    <input type="email" id="correo" placeholder="Correo">
    <input type="password" id="password" placeholder="Contraseña">
    <button onclick="registrar()">Registrarse</button>

</div>

<script src="/static/animaciones.js"></script>

<script>
function registrar(){
    fetch("/registro", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            correo: document.getElementById("correo").value,
            usuario: document.getElementById("usuario").value,
            contrasena: document.getElementById("password").value,
            codigo: 123
        })
    })
    .then(res => res.json())
    .then(data => alert(data.mensaje));
}

function login(){
    fetch("/login", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            correo: document.getElementById("correoLogin").value,
            contrasena: document.getElementById("passwordLogin").value
        })
    })
    .then(res => res.json())
    .then(data => {
        alert(data.mensaje);
        if (data.mensaje.includes("Bienvenido")) {
            window.location.href = "/dashboard";
        }
    });
}
</script>

</body>
</html>
