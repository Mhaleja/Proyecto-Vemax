<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VEMAX</title>

    <link rel="shortcut icon" href="icon/VEMAX.png">
    <link rel="stylesheet" href="estilos.css">
</head>

<body>
    <div class="container">
        <div class="part1-container">

            <div class="encabezado">
                <span>VEMAX</span>
            </div>

            <div class="form">

                <!-- LOGIN -->
                <form class="inicio">
                    <h2>Bienvenido de nuevo</h2>

                    <div class="input">
                        <label>Correo</label>
                        <input type="email" id="correoLogin">
                    </div>

                    <div class="input">
                        <label>Contraseña</label>
                        <input type="password" id="passwordLogin">
                    </div>

                    <button type="button" onclick="login()">Iniciar sesión</button>

                    <button type="button">
                        <img src="icon/google.png" width="20">
                        Google
                    </button>
                </form>

                <!-- REGISTRO -->
                <form class="registro">
                    <h2>Crear cuenta</h2>

                    <input type="text" id="usuario" placeholder="Usuario">
                    <input type="email" id="correo" placeholder="Correo">
                    <input type="password" id="password" placeholder="Contraseña">

                    <button type="button" onclick="registrar()">Registrarse</button>
                </form>

            </div>
        </div>
    </div>

    <script src="animaciones.js"></script>

    <script>
    function registrar(){
        let correo = document.getElementById("correo").value;
        let usuario = document.getElementById("usuario").value;
        let password = document.getElementById("password").value;

        fetch("/registro", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({
                correo: correo,
                usuario: usuario,
                contrasena: password,
                codigo: 123
            })
        })
        .then(res => res.json())
        .then(data => alert(data.mensaje))
        .catch(() => alert("Error"));
    }

    function login(){
        let correo = document.getElementById("correoLogin").value;
        let password = document.getElementById("passwordLogin").value;

        fetch("/login", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({
                correo: correo,
                contrasena: password
            })
        })
        .then(res => res.json())
        .then(data => {
            alert(data.mensaje);

            setTimeout(() => {
                window.location.href = "/dashboard";
            }, 1000);
        })
        .catch(() => alert("Error"));
    }
    </script>

</body>
</html>
