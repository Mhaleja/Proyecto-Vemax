<!DOCTYPE html>
<html>
<head>
    <title>Mi API de Eventos</title>
    <style>
        body{
        font-family: Arial;
        background-color: #160642;
        text-align: center;
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        }

        .container{
            width: 400px;
            margin: auto;
            background: rgba(255, 255, 255, 0.826);
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgb(123, 156, 185);
        }

        input{
            width: 90%;
            padding: 8px;
            margin: 5px;
        }

        button{
            padding: 10px;
            background-color: #143a62;
            color: white;
            border: none;
            margin-top: 10px;
            cursor: pointer;
        }

        button:hover{
            background-color: #263748;
        }

        h2{
            color: #333;
        }
    </style>
</head>

<body>

<div class="container">

<h2>Registro</h2>

<input id="correo" placeholder="Correo"><br>
<input id="usuario" placeholder="Usuario"><br>
<input id="password" type="password" placeholder="Contraseña"><br>
<input id="edad" type="number" placeholder="Edad"><br>

<button onclick="registrar()">Registrarse</button>

<hr>

<h2>Login</h2>

<input id="correoLogin" placeholder="Correo"><br>
<input id="passwordLogin" type="password" placeholder="Contraseña"><br>

<button onclick="login()">Entrar</button>

<p id="respuesta"></p>

</div>

<script>
function registrar(){
    let correo = document.getElementById("correo").value;
    let usuario = document.getElementById("usuario").value;
    let password = document.getElementById("password").value;
    let edad = parseInt(document.getElementById("edad").value);

    fetch("/registro", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ correo, usuario, password, edad })
    })
    .then(res => res.json())
    .then(data => {
        document.getElementById("respuesta").textContent = data.mensaje;
    });
}

function login(){
    let correo = document.getElementById("correoLogin").value;
    let password = document.getElementById("passwordLogin").value;

    fetch("/login", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ correo, password })
    })
    .then(res => res.json())
    .then(data => {
        document.getElementById("respuesta").textContent = data.mensaje;
    });
}
</script>

</body>
</html>
