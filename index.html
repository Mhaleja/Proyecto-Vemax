<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VEMAX</title>

    <link rel="shortcut icon" href="/icon/VEMAX.png">
    <link rel="stylesheet" href="/estilos.css">
</head>

<body>
    <div class="container">
        <div class="part1-container">

            <div class="encabezado">
                <span>VEMAX</span>
            </div>

            <div class="form" id="form">

                <!-- LOGIN -->
                <form class="inicio">
                    <h2>Bienvenido de nuevo</h2>
                    <p>¡Hola! Es momento de organizar las nueces del día.</p>

                    <div class="input">
                        <label>Correo</label>
                        <input type="email" id="correoLogin">
                    </div>

                    <div class="input">
                        <label>Contraseña</label>
                        <input type="password" id="passwordLogin">
                    </div>

                    <div class="botones">
                        <button type="button" onclick="login()">Iniciar sesión</button>
                    </div>

                    <p class="cuenta">¿No tienes cuenta? <a href="#" id="sign-up">Regístrate</a></p>
                </form>

                <!-- REGISTRO -->
                <form class="registro">
                    <h2>Crea tu cuenta</h2>

                    <div class="input">
                        <label>Usuario</label>
                        <input type="text" id="usuario">
                    </div>

                    <div class="input">
                        <label>Correo</label>
                        <input type="email" id="correo">
                    </div>

                    <div class="input">
                        <label>Contraseña</label>
                        <input type="password" id="password">
                    </div>

                    <div class="botones">
                        <button type="button" onclick="registrar()">Registrarse</button>
                    </div>

                    <p class="cuenta">¿Ya tienes cuenta? <a href="#" id="sign-in">Iniciar Sesión</a></p>
                </form>

            </div>

        </div>

        <div class="part2-banner">
            <div class="circle"></div>
        </div>
    </div>

    <script src="/animaciones.js"></script>

    <script>
    function registrar(){
        let correo = document.getElementById("correo").value;
        let usuario = document.getElementById("usuario").value;
        let password = document.getElementById("password").value;

        fetch("/registro", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ 
                correo: correo,
                usuario: usuario,
                contrasena: password,
                codigo: 123
            })
        })
        .then(res => res.json())
        .then(data => {
            console.log(data); 

            if(data.mensaje){
                alert(data.mensaje);
            } else if(data.detail){
                alert(data.detail);
            } else {
                alert("Error inesperado");
            }
        })
        .catch(error => {
            console.error("Error:", error);
            alert("Error en conexión");
        });
    }

    function login(){
        let correo = document.getElementById("correoLogin").value;
        let password = document.getElementById("passwordLogin").value;

        fetch("/login", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ 
                correo: correo,
                contrasena: password
            })
        })
        .then(res => res.json())
        .then(data => {
            console.log(data);

            if(data.mensaje){
                alert(data.mensaje);
            } else {
                alert("Error en login");
            }
        })
        .catch(error => {
            console.error("Error:", error);
            alert("Error en conexión");
        });
    }
    </script>

</body>
</html>
